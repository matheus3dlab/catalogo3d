<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Catálogo de Arganéis</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >
</head>

<body>

  <!-- HERO -->
  <header class="hero">

    <div class="overlay"></div>

    <div class="hero-content">

      <h1>
        Catálogo de Arganéis Escoteiros
      </h1>

      <p>
        Modelos exclusivos feitos em impressão 3D
      </p>

      <a href="#catalogo" class="hero-btn">
        Ver Catálogo
      </a>

    </div>

  </header>

  <!-- FILTROS -->
  <section class="filters" id="catalogo">

    <input
      type="text"
      id="searchInput"
      placeholder="Buscar arganel..."
    >

    <select id="categoryFilter">
      <option value="Todos">Todas Categorias</option>
      <option value="Tradicionais">Tradicionais</option>
      <option value="Animais">Animais</option>
      <option value="Animais com Lenço">Animais com Lenço</option>
      <option value="Personagens">Personagens</option>
      <option value="Personagens com Lenço">Personagens com Lenço</option>
      <option value="Personalizáveis">Personalizáveis</option>
    </select>

    <select id="sortFilter">
      <option value="default">Ordenar</option>
      <option value="low">Menor preço</option>
      <option value="high">Maior preço</option>
      <option value="name">Nome</option>
    </select>

  </section>

  <!-- PRODUTOS -->
  <main class="products-container" id="productsContainer">

  </main>

  <!-- FOOTER -->
  <footer>

    <p>
      © 2026 Catálogo de Arganéis Escoteiros
    </p>

  </footer>

  <script src="script.js"></script>

</body>
</html>
